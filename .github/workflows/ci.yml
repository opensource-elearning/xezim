name: CI

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write  # needed to post auto-fix suggestions on PRs

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
      # Clone xezim-core as sibling — required for cargo fmt/clippy to resolve path = "../xezim-core"
      - name: Clone xezim-core
        run: git clone --depth 1 https://github.com/opensource-elearning/xezim-core.git ../xezim-core
      - name: Check formatting
        id: fmt
        run: cargo fmt --check
      - name: Post auto-fix suggestion
        if: steps.fmt.outcome == 'failure' && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## ❌ Formatting check failed

            The `cargo fmt` check found code that doesn't follow Rust style conventions.

            **To fix:** Comment `/fix-lint` on this PR — it will run `cargo fmt` and push the fixes automatically.
      # Clippy scoped to xezim only (--no-deps ignores sibling repo warnings)
      - name: Lint
        id: clippy
        run: cargo clippy --no-deps -p xezim
        continue-on-error: true  # FIXME: remove once source warnings are cleaned up
      # Posts a PR comment when clippy finds issues, so user knows to run /fix-lint
      - name: Post auto-fix suggestion
        if: steps.clippy.outcome == 'failure' && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## ⚠️ Clippy has suggestions

            `cargo clippy` found some code patterns that could be improved.

            **To fix:** Comment `/fix-lint` on this PR — it will run `cargo clippy --fix` and `cargo fmt` automatically.

  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Clone xezim-core as sibling for --local mode
      - name: Clone xezim-core (sibling)
        run: git clone --depth 1 https://github.com/opensource-elearning/xezim-core.git ../xezim-core

      # Tests the install script end-to-end using local checkout (--local)
      - name: Run installer
        run: |
          bash scripts/install.sh --local

      - name: Verify xezim
        run: |
          xezim --help
          xezim --version

      - name: Run test suite
        run: cargo test --release

  install-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      # Clone xezim-core as sibling
      - name: Clone xezim-core (sibling)
        run: git clone --depth 1 https://github.com/opensource-elearning/xezim-core.git ../xezim-core

      # Build directly (install.ps1 clones from remote main, not PR branch)
      - name: Build xezim (release)
        run: cargo build --release

      - name: Verify xezim
        run: |
          $bin = "${{ github.workspace }}\target\release\xezim.exe"
          & $bin --help
          & $bin --version
