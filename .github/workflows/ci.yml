name: CI

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write  # needed to post auto-fix suggestions on PRs

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
      # Clone xezim-core as sibling — required for cargo fmt/clippy to resolve path = "../xezim-core"
      - name: Clone xezim-core
        run: git clone --depth 1 https://github.com/opensource-elearning/xezim-core.git ../xezim-core
      - name: Check formatting
        id: fmt
        run: cargo fmt --check
        continue-on-error: true  # let post-comment step run
      # Clippy scoped to xezim only (--no-deps ignores sibling repo warnings)
      - name: Lint
        id: clippy
        run: cargo clippy --no-deps -p xezim
        continue-on-error: true  # FIXME: remove once source warnings are cleaned up
      # Posts a consolidated PR comment when lint finds issues
      - name: Post lint results
        if: (steps.fmt.outcome == 'failure' || steps.clippy.outcome == 'failure') && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v5.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 📋 Lint check results

            ${{ steps.fmt.outcome == 'failure' && '❌ **Formatting** — `cargo fmt` found code that doesn\'t follow Rust style conventions.' || '' }}
            ${{ steps.clippy.outcome == 'failure' && '⚠️ **Clippy** — `cargo clippy` found patterns that could be improved.' || '' }}

            **To fix:** Comment `/fix-lint` on this PR — it will run `cargo fmt` ${{ (steps.fmt.outcome == 'failure' && steps.clippy.outcome == 'failure') && 'and `cargo clippy --fix`' || (steps.clippy.outcome == 'failure' && 'and `cargo clippy --fix`') || '' }} and push automatically.

  install-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1

      # Clone xezim-core as sibling for --local mode
      - name: Clone xezim-core (sibling)
        run: git clone --depth 1 https://github.com/opensource-elearning/xezim-core.git ../xezim-core

      # Tests the install script end-to-end using local checkout (--local)
      - name: Run installer
        run: |
          bash scripts/install.sh --local

      - name: Verify xezim
        run: |
          xezim --help || true
          xezim -V || true

      - name: Run test suite
        run: cargo test --release

  install-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v7.0.1

      # Clone xezim-core as sibling
      - name: Clone xezim-core (sibling)
        run: git clone --depth 1 https://github.com/opensource-elearning/xezim-core.git ../xezim-core

      # Build directly (install.ps1 clones from remote main, not PR branch)
      - name: Build xezim (release)
        run: cargo build --release

      - name: Verify xezim
        run: |
          $bin = Join-Path ${{ github.workspace }} "target" "release" "xezim.exe"
          Write-Host "Binary: $bin"
          Write-Host "Exists: $(Test-Path $bin)"
          & $bin --help 2>&1 | Out-Null

      # TODO(Windows): fix bit_class_property_signedness tests (Os NotFound on subprocess paths)
      - name: Run test suite
        run: cargo test --release -- --skip bit_class_property_is_unsigned --skip cross_process_wait_on_bit_member
