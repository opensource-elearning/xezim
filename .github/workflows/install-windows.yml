name: Install Windows

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  install-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v7.0.1

      # Clone xezim-core as sibling
      - name: Clone xezim-core (sibling)
        run: git clone --depth 1 https://github.com/opensource-elearning/xezim-core.git ../xezim-core

      # Build directly (install.ps1 clones from remote main, not PR branch)
      - name: Build xezim (release)
        run: cargo build --release

      - name: Verify xezim
        run: |
          $bin = Join-Path ${{ github.workspace }} "target" "release" "xezim.exe"
          Write-Host "Binary: $bin"
          Write-Host "Exists: $(Test-Path $bin)"
          & $bin --help 2>&1 | Out-Null

      # TODO(Windows): fix bit_class_property_signedness tests (Os NotFound on subprocess paths)
      - name: Run test suite
        run: cargo test --release -- --skip bit_class_property_is_unsigned --skip cross_process_wait_on_bit_member
